<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeyes — auto scene narration</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <header>
      <h1>Aeyes</h1>
      <p class="tagline">A camera that narrates what you can't see.</p>
    </header>

    <section id="status-card" aria-live="polite" aria-atomic="true">
      <p class="status-label">Status</p>
      <p id="status-text" class="status-text">Initializing…</p>

      <p id="response-text" class="response-text" hidden></p>
      <p id="latency-chip" class="latency-chip" hidden></p>
    </section>

    <section id="controls">
      <button id="auto-btn" class="primary" disabled>Start auto-capture</button>
      <button id="describe-btn" disabled>Describe my surroundings</button>
      <button id="change-btn" disabled>What just changed?</button>
    </section>

    <section id="camera-section">
      <p class="muted">Camera preview</p>
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="capture-canvas" hidden></canvas>
      <img id="last-frame" alt="last captured frame" hidden />
    </section>

    <section id="history-section" hidden>
      <p class="muted">Recent investigations</p>
      <ul id="history-list"></ul>
    </section>

    <footer>
      <p class="muted">Auto-captures every 5 s · No frames stored · Vision via SeeingEye Translator → Reasoner</p>
    </footer>
  </main>

  <script src="/static/clip_buffer.js"></script>
  <script src="/static/app.js" type="module"></script>
</body>
</html>
